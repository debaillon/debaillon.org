
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Wikipedia Infographic Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .search-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .search-form {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-btn {
            padding: 15px 30px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .search-btn:hover {
            transform: translateY(-2px);
        }

        .search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .infographic {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .infographic-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .infographic-title {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .infographic-subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .infographic-content {
            padding: 30px;
        }

        /* Interactive Elements */
        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
        }

        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab:hover {
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Chart Containers */
        .chart-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            position: relative;
            height: 400px;
        }

        .chart-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }

        /* Word Cloud Container */
        .wordcloud-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            min-height: 300px;
        }

        /* Interactive Timeline */
        .timeline-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .timeline-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .timeline-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .timeline-year {
            font-weight: bold;
            font-size: 1.1rem;
            color: #667eea;
            margin-bottom: 5px;
        }

        .timeline-details {
            display: none;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
            color: #666;
        }

        .timeline-item.expanded .timeline-details {
            display: block;
        }

        /* Interactive Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .stat-card:hover::before {
            left: 100%;
        }

        /* Content Analysis */
        .content-analysis {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .analysis-item {
            padding: 15px;
            background: white;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #28a745;
        }

        /* Interactive Sections */
        .expandable-section {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .section-header {
            padding: 15px 20px;
            background: #f8f9fa;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #333;
        }

        .section-header:hover {
            background: #e9ecef;
        }

        .section-arrow {
            transition: transform 0.3s ease;
        }

        .expandable-section.expanded .section-arrow {
            transform: rotate(180deg);
        }

        .section-content {
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .expandable-section.expanded .section-content {
            max-height: 500px;
            padding: 20px;
        }

        /* Network Graph */
        .network-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            min-height: 400px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #c33;
            margin: 20px 0;
        }

        .hidden {
            display: none;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .search-form {
                flex-direction: column;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .infographic-title {
                font-size: 1.5rem;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .tab {
                flex: 1;
                min-width: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Interactive Wikipedia Explorer</h1>
            <p>Transform Wikipedia articles into beautiful, interactive infographics</p>
        </div>

        <div class="search-section">
            <form class="search-form" id="searchForm">
                <input type="text" class="search-input" id="searchInput" placeholder="Enter a topic to explore..." required>
                <button type="submit" class="search-btn" id="searchBtn">Create Interactive Infographic</button>
            </form>
        </div>

        <div class="loading hidden" id="loading">
            <div class="spinner"></div>
            <p>Analyzing Wikipedia content and creating interactive visualizations...</p>
        </div>

        <div class="error hidden" id="error"></div>

        <div class="infographic hidden" id="infographic">
            <div class="infographic-header">
                <h2 class="infographic-title" id="infoTitle"></h2>
                <p class="infographic-subtitle" id="infoSubtitle">Interactive Wikipedia Analysis</p>
            </div>
            <div class="infographic-content" id="infoContent"></div>
        </div>
    </div>

    <script>
        class InteractiveWikipediaGenerator {
            constructor() {
                this.searchForm = document.getElementById('searchForm');
                this.searchInput = document.getElementById('searchInput');
                this.searchBtn = document.getElementById('searchBtn');
                this.loading = document.getElementById('loading');
                this.error = document.getElementById('error');
                this.infographic = document.getElementById('infographic');
                this.infoTitle = document.getElementById('infoTitle');
                this.infoContent = document.getElementById('infoContent');

                this.currentData = null;
                this.charts = {};

                this.initEventListeners();
            }

            initEventListeners() {
                this.searchForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.generateInfographic();
                });
            }

            async generateInfographic() {
                const query = this.searchInput.value.trim();
                if (!query) {
                    this.showError('Please enter a search term.');
                    return;
                }

                this.showLoading();
                this.hideError();
                this.hideInfographic();

                try {
                    const data = await this.fetchWikipediaData(query);
                    this.currentData = data;
                    this.createInteractiveInfographic(data);
                } catch (error) {
                    console.error('Error generating infographic:', error);
                    this.showError(error.message || 'An unexpected error occurred. Please try again.');
                } finally {
                    this.hideLoading();
                }
            }

            async fetchWikipediaData(query) {
                try {
                    // Get detailed page content
                    const pageUrl = `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=extracts|pageimages|info|categories|links|sections&explaintext=1&exsectionformat=plain&piprop=thumbnail&pithumbsize=300&inprop=url&titles=${encodeURIComponent(query)}&redirects=1&pllimit=50`;
                    
                    const response = await fetch(pageUrl);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    if (data.error) {
                        throw new Error(`Wikipedia API error: ${data.error.info}`);
                    }

                    const pages = data.query.pages;
                    const pageId = Object.keys(pages)[0];
                    
                    if (pageId === '-1') {
                        throw new Error('Article not found. Please try a different search term.');
                    }
                    
                    const pageData = pages[pageId];

                    // Get page sections for structure analysis
                    const sectionsUrl = `https://en.wikipedia.org/w/api.php?action=parse&format=json&origin=*&page=${encodeURIComponent(pageData.title)}&prop=sections&section=0`;
                    const sectionsResponse = await fetch(sectionsUrl);
                    const sectionsData = await sectionsResponse.json();

                    // Get page views data (mock data for demo)
                    const pageViews = this.generatePageViewsData();

                    return {
                        title: pageData.title,
                        extract: pageData.extract || 'No content available',
                        thumbnail: pageData.thumbnail ? pageData.thumbnail.source : null,
                        url: pageData.fullurl,
                        categories: (pageData.categories || []).slice(0, 10),
                        links: (pageData.links || []).slice(0, 20),
                        pageId: pageData.pageid,
                        sections: sectionsData.parse ? sectionsData.parse.sections : [],
                        pageViews: pageViews,
                        textLength: pageData.extract ? pageData.extract.length : 0
                    };
                } catch (error) {
                    console.error('Wikipedia API Error:', error);
                    throw new Error(`Failed to fetch Wikipedia data: ${error.message}`);
                }
            }

            generatePageViewsData() {
                // Generate mock page views data for the last 30 days
                const data = [];
                const today = new Date();
                for (let i = 29; i >= 0; i--) {
                    const date = new Date(today);
                    date.setDate(date.getDate() - i);
                    data.push({
                        date: date.toISOString().split('T')[0],
                        views: Math.floor(Math.random() * 1000) + 100
                    });
                }
                return data;
            }

            createInteractiveInfographic(data) {
                this.infoTitle.textContent = data.title;

                // Create tabbed interface
                const content = this.createTabbedInterface(data);
                this.infoContent.innerHTML = content;

                // Initialize interactive elements
                this.initializeTabs();
                this.initializeCharts(data);
                this.initializeInteractiveElements();
                
                this.showInfographic();
            }

            createTabbedInterface(data) {
                return `
                    <div class="tabs">
                        <button class="tab active" data-tab="overview">📊 Overview</button>
                        <button class="tab" data-tab="analytics">📈 Analytics</button>
                        <button class="tab" data-tab="content">📝 Content Analysis</button>
                        <button class="tab" data-tab="connections">🔗 Connections</button>
                        <button class="tab" data-tab="timeline">⏰ Timeline</button>
                    </div>

                    <div class="tab-content active" id="overview">
                        ${this.createOverviewTab(data)}
                    </div>

                    <div class="tab-content" id="analytics">
                        ${this.createAnalyticsTab(data)}
                    </div>

                    <div class="tab-content" id="content">
                        ${this.createContentTab(data)}
                    </div>

                    <div class="tab-content" id="connections">
                        ${this.createConnectionsTab(data)}
                    </div>

                    <div class="tab-content" id="timeline">
                        ${this.createTimelineTab(data)}
                    </div>
                `;
            }

            createOverviewTab(data) {
                const summary = this.createSummary(data.extract);
                const statistics = this.extractStatistics(data.extract, data.title);
                const keyFacts = this.extractKeyFacts(data.extract, data.title);

                return `
                    <div class="content-analysis">
                        <h3>📋 Quick Summary</h3>
                        <div class="analysis-item">${summary}</div>
                    </div>

                    ${statistics.length > 0 ? `
                        <div class="stats-grid">
                            ${statistics.map(stat => `
                                <div class="stat-card" data-info="${stat.label}: ${stat.number}">
                                    <div class="stat-number">${stat.number}</div>
                                    <div class="stat-label">${stat.label}</div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}

                    ${keyFacts.length > 0 ? `
                        <div class="expandable-section">
                            <div class="section-header">
                                🔍 Key Facts & Details
                                <span class="section-arrow">▼</span>
                            </div>
                            <div class="section-content">
                                ${keyFacts.map(fact => `
                                    <div class="analysis-item">
                                        <strong>${fact.label}:</strong> ${fact.value}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}

                    <div class="expandable-section">
                        <div class="section-header">
                            🏷️ Categories & Topics
                            <span class="section-arrow">▼</span>
                        </div>
                        <div class="section-content">
                            <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                                ${data.categories.map(cat => `
                                    <span style="background: #667eea; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.9rem;">
                                        ${cat.title.replace('Category:', '')}
                                    </span>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }

            createAnalyticsTab(data) {
                return `
                    <div class="chart-container">
                        <div class="chart-title">📈 Simulated Page Views (Last 30 Days)</div>
                        <canvas id="pageViewsChart"></canvas>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number">${data.textLength.toLocaleString()}</div>
                            <div class="stat-label">Characters</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${Math.floor(data.textLength / 5)}</div>
                            <div class="stat-label">Est. Words</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${data.categories.length}</div>
                            <div class="stat-label">Categories</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${data.links.length}</div>
                            <div class="stat-label">Links</div>
                        </div>
                    </div>

                    <div class="chart-container">
                        <div class="chart-title">📊 Content Composition</div>
                        <canvas id="contentChart"></canvas>
                    </div>
                `;
            }

            createContentTab(data) {
                const wordFreq = this.analyzeWordFrequency(data.extract);
                const sentences = data.extract.split(/[.!?]+/).filter(s => s.trim().length > 20);
                
                return `
                    <div class="wordcloud-container">
                        <div class="chart-title">☁️ Most Frequent Words</div>
                        <div id="wordCloud"></div>
                    </div>

                    <div class="content-analysis">
                        <h3>📝 Content Breakdown</h3>
                        <div class="analysis-item">
                            <strong>Reading Time:</strong> ~${Math.ceil(data.textLength / 1000)} minutes
                        </div>
                        <div class="analysis-item">
                            <strong>Complexity:</strong> ${this.calculateComplexity(data.extract)}
                        </div>
                        <div class="analysis-item">
                            <strong>Sentences:</strong> ${sentences.length}
                        </div>
                    </div>

                    <div class="expandable-section">
                        <div class="section-header">
                            🎯 Key Sentences
                            <span class="section-arrow">▼</span>
                        </div>
                        <div class="section-content">
                            ${sentences.slice(0, 5).map((sentence, i) => `
                                <div class="analysis-item">
                                    <strong>Sentence ${i + 1}:</strong> ${sentence.trim()}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            createConnectionsTab(data) {
                return `
                    <div class="network-container">
                        <div class="chart-title">🕸️ Related Articles Network</div>
                        <div id="networkGraph"></div>
                    </div>

                    <div class="expandable-section">
                        <div class="section-header">
                            🔗 Linked Articles
                            <span class="section-arrow">▼</span>
                        </div>
                        <div class="section-content">
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;">
                                ${data.links.slice(0, 12).map(link => `
                                    <div style="background: #f8f9fa; padding: 10px; border-radius: 8px; border-left: 3px solid #667eea;">
                                        ${link.title}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }

            createTimelineTab(data) {
                const timeline = this.extractTimeline(data.extract, data.title);
                
                return `
                    <div class="timeline-container">
                        <div class="chart-title">📅 Historical Timeline</div>
                        ${timeline.length > 0 ? 
                            timeline.map(item => `
                                <div class="timeline-item" data-year="${item.year}">
                                    <div class="timeline-year">${item.year}</div>
                                    <div>${item.event}</div>
                                    <div class="timeline-details">
                                        Click to explore more about this period...
                                    </div>
                                </div>
                            `).join('') :
                            '<div class="analysis-item">No clear timeline events found in the content.</div>'
                        }
                    </div>
                `;
            }

            initializeTabs() {
                const tabs = document.querySelectorAll('.tab');
                const tabContents = document.querySelectorAll('.tab-content');

                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        const targetTab = tab.dataset.tab;

                        // Remove active class from all tabs and contents
                        tabs.forEach(t => t.classList.remove('active'));
                        tabContents.forEach(tc => tc.classList.remove('active'));

                        // Add active class to clicked tab and corresponding content
                        tab.classList.add('active');
                        document.getElementById(targetTab).classList.add('active');
                    });
                });
            }

            initializeCharts(data) {
                // Initialize charts after a small delay to ensure DOM is ready
                setTimeout(() => {
                    this.createPageViewsChart(data.pageViews);
                    this.createContentChart(data);
                    this.createWordCloud(data.extract);
                    this.createNetworkGraph(data);
                }, 100);
            }

            createPageViewsChart(pageViews) {
                const ctx = document.getElementById('pageViewsChart');
                if (!ctx) return;

                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: pageViews.map(pv => new Date(pv.date).toLocaleDateString()),
                        datasets: [{
                            label: 'Page Views',
                            data: pageViews.map(pv => pv.views),
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            }

            createContentChart(data) {
                const ctx = document.getElementById('contentChart');
                if (!ctx) return;

                const contentData = {
                    labels: ['Text Content', 'Categories', 'Links', 'Sections'],
                    datasets: [{
                        data: [
                            Math.floor(data.textLength / 100),
                            data.categories.length,
                            data.links.length,
                            data.sections.length
                        ],
                        backgroundColor: [
                            '#667eea',
                            '#764ba2',
                            '#4facfe',
                            '#00f2fe'
                        ]
                    }]
                };

                new Chart(ctx, {
                    type: 'doughnut',
                    data: contentData,
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom'
                            }
                        }
                    }
                });
            }

            createWordCloud(text) {
                const wordFreq = this.analyzeWordFrequency(text);
                const container = document.getElementById('wordCloud');
                if (!container) return;

                // Simple word cloud using styled spans
                container.innerHTML = Object.entries(wordFreq)
                    .slice(0, 30)
                    .map(([word, count]) => {
                        const fontSize = Math.max(12, Math.min(32, count * 2));
                        const color = `hsl(${Math.random() * 360}, 70%, 50%)`;
                        return `<span style="font-size: ${fontSize}px; color: ${color}; margin: 5px; display: inline-block;">${word}</span>`;
                    })
                    .join('');
            }

            createNetworkGraph(data) {
                const container = document.getElementById('networkGraph');
                if (!container) return;

                // Create a simple network visualization
                const width = container.offsetWidth;
                const height = 350;

                const svg = d3.select(container)
                    .append('svg')
                    .attr('width', width)
                    .attr('height', height);

                // Create nodes and links data
                const nodes = [
                    { id: data.title, group: 1, x: width/2, y: height/2 },
                    ...data.links.slice(0, 10).map((link, i) => ({
                        id: link.title,
                        group: 2,
                        x: Math.random() * width,
                        y: Math.random() * height
                    }))
                ];

                const links = data.links.slice(0, 10).map(link => ({
                    source: data.title,
                    target: link.title
                }));

                // Create force simulation
                const simulation = d3.forceSimulation(nodes)
                    .force('link', d3.forceLink(links).id(d => d.id))
                    .force('charge', d3.forceManyBody().strength(-100))
                    .force('center', d3.forceCenter(width / 2, height / 2));

                // Add links
                const link = svg.append('g')
                    .selectAll('line')
                    .data(links)
                    .enter().append('line')
                    .attr('stroke', '#999')
                    .attr('stroke-opacity', 0.6)
                    .attr('stroke-width', 1);

                // Add nodes
                const node = svg.append('g')
                    .selectAll('circle')
                    .data(nodes)
                    .enter().append('circle')
                    .attr('r', d => d.group === 1 ? 8 : 5)
                    .attr('fill', d => d.group === 1 ? '#667eea' : '#4facfe')
                    .call(d3.drag()
                        .on('start', dragstarted)
                        .on('drag', dragged)
                        .on('end', dragended));

                // Add labels
                const labels = svg.append('g')
                    .selectAll('text')
                    .data(nodes)
                    .enter().append('text')
                    .text(d => d.id.length > 15 ? d.id.substring(0, 15) + '...' : d.id)
                    .attr('font-size', '10px')
                    .attr('dx', 10)
                    .attr('dy', 5);

                simulation.on('tick', () => {
                    link
                        .attr('x1', d => d.source.x)
                        .attr('y1', d => d.source.y)
                        .attr('x2', d => d.target.x)
                        .attr('y2', d => d.target.y);

                    node
                        .attr('cx', d => d.x)
                        .attr('cy', d => d.y);

                    labels
                        .attr('x', d => d.x)
                        .attr('y', d => d.y);
                });

                function dragstarted(event, d) {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    d.fx = d.x;
                    d.fy = d.y;
                }

                function dragged(event, d) {
                    d.fx = event.x;
                    d.fy = event.y;
                }

                function dragended(event, d) {
                    if (!event.active) simulation.alphaTarget(0);
                    d.fx = null;
                    d.fy = null;
                }
            }

            initializeInteractiveElements() {
                // Initialize expandable sections
                document.querySelectorAll('.expandable-section').forEach(section => {
                    const header = section.querySelector('.section-header');
                    header.addEventListener('click', () => {
                        section.classList.toggle('expanded');
                    });
                });

                // Initialize timeline items
                document.querySelectorAll('.timeline-item').forEach(item => {
                    item.addEventListener('click', () => {
                        item.classList.toggle('expanded');
                    });
                });

                // Initialize stat cards with tooltips
                document.querySelectorAll('.stat-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const info = card.dataset.info;
                        if (info) {
                            alert(info); // Simple tooltip - could be enhanced
                        }
                    });
                });
            }

            // Analysis methods
            analyzeWordFrequency(text) {
                const words = text.toLowerCase()
                    .replace(/[^\w\s]/g, '')
                    .split(/\s+/)
                    .filter(word => word.length > 3 && !this.isStopWord(word));

                const frequency = {};
                words.forEach(word => {
                    frequency[word] = (frequency[word] || 0) + 1;
                });

                return Object.fromEntries(
                    Object.entries(frequency)
                        .sort(([,a], [,b]) => b - a)
                        .slice(0, 50)
                );
            }

            isStopWord(word) {
                const stopWords = ['the', 'and', 'that', 'have', 'for', 'not', 'with', 'you', 'this', 'but', 'his', 'from', 'they', 'she', 'her', 'been', 'than', 'its', 'were', 'said', 'each', 'which', 'their', 'time', 'will', 'about', 'would', 'there', 'could', 'other', 'after', 'first', 'well', 'many', 'very', 'when', 'much', 'new', 'some', 'had', 'just', 'your', 'any', 'may', 'say', 'get', 'has', 'him', 'old', 'see', 'now', 'way', 'who', 'boy', 'did', 'its', 'let', 'put', 'too', 'old', 'why', 'how', 'our', 'out', 'day', 'use', 'her', 'two', 'more', 'go'];
                return stopWords.includes(word);
            }

            calculateComplexity(text) {
                const sentences = text.split(/[.!?]+/).filter(s => s.trim());
                const words = text.split(/\s+/).filter(w => w.trim());
                const avgWordsPerSentence = words.length / sentences.length;
                
                if (avgWordsPerSentence > 20) return 'High';
                if (avgWordsPerSentence > 15) return 'Medium';
                return 'Low';
            }

            // Existing methods from original code (adapted)
            extractStatistics(text, title) {
                const stats = [];
                
                const patterns = [
                    { pattern: /born[^0-9]*(\d{4})/i, label: 'Birth Year', type: 'year' },
                    { pattern: /died[^0-9]*(\d{4})/i, label: 'Death Year', type: 'year' },
                    { pattern: /(?:founded|established)[^0-9]*(\d{4})/i, label: 'Founded', type: 'year' },
                    { pattern: /population[^0-9]*([0-9,]+)(?:\s+million)?/i, label: 'Population', type: 'number' },
                    { pattern: /area[^0-9]*([0-9,]+)/i, label: 'Area (km²)', type: 'number' },
                    { pattern: /(?:employees|staff)[^0-9]*([0-9,]+)/i, label: 'Employees', type: 'number' },
                    { pattern: /(?:height|tall)[^0-9]*([0-9,]+)/i, label: 'Height (m)', type: 'number' },
                    { pattern: /revenue[^$]*\$([0-9.]+)\s*(billion|million)/i, label: 'Revenue', type: 'money' }
                ];

                patterns.forEach(({ pattern, label, type }) => {
                    const match = text.match(pattern);
                    if (match && match[1]) {
                        let value = match[1];
                        
                        if (type === 'money' && match[2]) {
                            value = `$${value}${match[2][0].toUpperCase()}`;
                        } else if (type === 'number') {
                            const num = parseInt(value.replace(/,/g, ''));
                            if (num >= 1000000) {
                                value = (num / 1000000).toFixed(1) + 'M';
                            } else if (num >= 1000) {
                                value = (num / 1000).toFixed(1) + 'K';
                            }
                        }
                        
                        stats.push({ number: value, label });
                    }
                });

                return stats.slice(0, 4);
            }

            extractKeyFacts(text, title) {
                const facts = [];
                const patterns = [
                    { pattern: /(?:born|birth)\s+(?:on\s+)?([^,;.!?]+)/i, label: 'Born' },
                    { pattern: /(?:died|death)\s+(?:on\s+)?([^,;.!?]+)/i, label: 'Died' },
                    { pattern: /(?:founded|established|created|built)\s+(?:in\s+|on\s+)?([^,;.!?]+)/i, label: 'Founded' },
                    { pattern: /capital\s+(?:city\s+)?(?:is\s+)?([A-Z][a-zA-Z\s]+?)(?:\s+is|[,.])/i, label: 'Capital' },
                    { pattern: /(?:located|situated)\s+(?:in\s+)?([A-Z][a-zA-Z\s,]+?)(?:[,.])/i, label: 'Location' },
                    { pattern: /(?:known\s+for|famous\s+for|notable\s+for)\s+([^.!?]+)/i, label: 'Known For' }
                ];

                patterns.forEach(({ pattern, label }) => {
                    const match = text.match(pattern);
                    if (match && match[1]) {
                        let value = match[1].trim().replace(/\s+/g, ' ');
                        if (value.length > 100) {
                            value = value.substring(0, 100) + '...';
                        }
                        facts.push({ label, value });
                    }
                });

                return facts.filter((fact, index, self) => 
                    index === self.findIndex(f => f.label === fact.label)
                ).slice(0, 8);
            }

            extractTimeline(text, title) {
                const events = [];
                const sentences = text.split(/[.!?]+/);
                
                sentences.forEach(sentence => {
                    const yearMatches = sentence.match(/\b(1[0-9]{3}|20[0-9]{2})\b/g);
                    if (yearMatches) {
                        yearMatches.forEach(year => {
                            let event = sentence.trim();
                            
                            if (event.length > 120) {
                                event = event.substring(0, 120) + '...';
                            }
                            
                            if (event.length > 20 && 
                                !event.toLowerCase().includes('wikipedia') && 
                                !event.toLowerCase().includes('citation')) {
                                events.push({ year: parseInt(year), event: event });
                            }
                        });
                    }
                });

                return events
                    .filter((event, index, self) => 
                        index === self.findIndex(e => e.year === event.year && e.event === event.event)
                    )
                    .sort((a, b) => a.year - b.year)
                    .slice(0, 8);
            }

            createSummary(text) {
                const sentences = text.split(/[.!?]+/);
                const importantSentences = [];
                
                if (sentences[0] && sentences[0].trim().length > 20) {
                    importantSentences.push(sentences[0].trim());
                }
                
                const keywordPatterns = [
                    /(?:known for|famous for|notable for)/i,
                    /(?:born|died|founded|established)/i,
                    /(?:located|situated)/i,
                    /(?:population|area|employees)/i
                ];
                
                sentences.slice(1).forEach(sentence => {
                    if (importantSentences.length < 3 && sentence.trim().length > 30) {
                        if (keywordPatterns.some(pattern => pattern.test(sentence))) {
                            importantSentences.push(sentence.trim());
                        }
                    }
                });
                
                if (importantSentences.length < 2) {
                    sentences.slice(1, 3).forEach(sentence => {
                        if (sentence.trim().length > 20 && importantSentences.length < 3) {
                            importantSentences.push(sentence.trim());
                        }
                    });
                }
                
                let summary = importantSentences.join('. ');
                if (summary.length > 400) {
                    summary = summary.substring(0, 400) + '...';
                }
                
                return summary + (summary.endsWith('.') ? '' : '.');
            }

            // UI helper methods
            showLoading() {
                this.loading.classList.remove('hidden');
                this.searchBtn.disabled = true;
                this.searchBtn.textContent = 'Generating...';
            }

            hideLoading() {
                this.loading.classList.add('hidden');
                this.searchBtn.disabled = false;
                this.searchBtn.textContent = 'Create Interactive Infographic';
            }

            showError(message) {
                this.error.textContent = message;
                this.error.classList.remove('hidden');
            }

            hideError() {
                this.error.classList.add('hidden');
            }

            showInfographic() {
                this.infographic.classList.remove('hidden');
                this.infographic.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            hideInfographic() {
                this.infographic.classList.add('hidden');
            }
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', () => {
            new InteractiveWikipediaGenerator();
        });
    </script>
